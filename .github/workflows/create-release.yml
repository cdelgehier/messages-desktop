---
name: Create Release

on:
  push:
    tags:
      - 'v*.*.*'

jobs:
  create-release:
    name: Create GitHub Release
    runs-on: ubuntu-latest

    permissions:
      contents: write

    outputs:
      upload_url: ${{ steps.create_release.outputs.upload_url }}
      version: ${{ steps.version.outputs.version }}

    steps:
      - name: Checkout code
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          fetch-depth: 0

      - name: Extract version from tag
        id: version
        run: |
          VERSION="${GITHUB_REF#refs/tags/v}"
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "tag=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT

      - name: Extract changelog section
        id: changelog
        run: |
          TAG="${{ steps.version.outputs.tag }}"

          CHANGELOG_SECTION=$(awk -v tag="$TAG" '
            /^## v/ {
              if (found) exit
              if ($2 == tag) found=1
              next
            }
            found {print}
          ' CHANGELOG.md)

          if [ -z "$CHANGELOG_SECTION" ]; then
            CHANGELOG_SECTION=$(cat CHANGELOG.md)
          fi

          echo "$CHANGELOG_SECTION" > release_notes.md

      - name: Create GitHub Release
        id: create_release
        uses: softprops/action-gh-release@a06a81a03ee405af7f2048a818ed3f03bbf83c7b # v2.5.0
        with:
          name: Release ${{ steps.version.outputs.tag }}
          body_path: release_notes.md
          tag_name: ${{ steps.version.outputs.tag }}
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Summary
        env:
          TAG: ${{ steps.version.outputs.tag }}
        run: |
          echo "✅ GitHub Release created for version $TAG" >> $GITHUB_STEP_SUMMARY
          echo "📦 Release URL: ${{ github.server_url }}/${{ github.repository }}/releases/tag/$TAG" >> $GITHUB_STEP_SUMMARY

  build-macos:
    name: Build macOS package (${{ matrix.arch }})
    needs: create-release

    strategy:
      matrix:
        include:
          - runs-on: macos-latest  # Apple Silicon (ARM)
            arch: aarch64
          - runs-on: macos-15-intel  # Intel (x86_64)
            arch: x86_64

    runs-on: ${{ matrix.runs-on }}

    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install Task
        uses: arduino/setup-task@b91d5d2c96a56797b48ac1e0e89220bf64044611 # v2.0.0
        with:
          version: 3.x
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Build package
        run: task package

      - name: Upload DMG to release
        uses: softprops/action-gh-release@a06a81a03ee405af7f2048a818ed3f03bbf83c7b # v2.5.0
        with:
          files: src-tauri/target/release/bundle/dmg/*.dmg
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Summary
        run: |
          echo "✅ macOS ${{ matrix.arch }} package built and uploaded" >> $GITHUB_STEP_SUMMARY
          ls -lh src-tauri/target/release/bundle/dmg/*.dmg >> $GITHUB_STEP_SUMMARY

  build-windows:
    name: Build Windows package
    runs-on: windows-2025
    needs: create-release

    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install Task
        uses: arduino/setup-task@b91d5d2c96a56797b48ac1e0e89220bf64044611 # v2.0.0
        with:
          version: 3.x
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Build package
        run: task package

      - name: Upload EXE to release
        uses: softprops/action-gh-release@a06a81a03ee405af7f2048a818ed3f03bbf83c7b # v2.5.0
        with:
          files: src-tauri/target/release/bundle/nsis/*.exe
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Summary
        run: |
          echo "Windows package built and uploaded" >> $env:GITHUB_STEP_SUMMARY
          Get-ChildItem src-tauri/target/release/bundle/nsis/*.exe | Select-Object Name, Length >> $env:GITHUB_STEP_SUMMARY
