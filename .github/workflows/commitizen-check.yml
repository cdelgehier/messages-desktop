---
name: Commitizen Check

on:
  # Validate each commit on every push
  push:
    branches-ignore:
      - main

  # Validate all commits in a PR to main
  pull_request:
    branches:
      - main

jobs:
  # Check the last commit message
  check-commit:
    name: Check commit message
    runs-on: ubuntu-latest
    if: github.event_name == 'push'

    permissions:
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: '3.x'

      - name: Install uv
        uses: astral-sh/setup-uv@38f3f104447c67c051c4a08e39b64a148898af3a # v4.2.0
        with:
          enable-cache: false

      - name: Install Commitizen
        run: uv tool install commitizen

      - name: Check commit message
        env:
          COMMIT_MESSAGE: ${{ github.event.head_commit.message }}
        run: uvx --from commitizen cz check --message "$COMMIT_MESSAGE"

  # Check all commits in the PR
  check-pr:
    name: Check all commits in PR
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'

    permissions:
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: '3.x'

      - name: Install uv
        uses: astral-sh/setup-uv@38f3f104447c67c051c4a08e39b64a148898af3a # v4.2.0
        with:
          enable-cache: false

      - name: Install Commitizen
        run: uv tool install commitizen

      - name: Check all commits in PR
        env:
          BASE_REF: ${{ github.base_ref }}
        run: |
          # Get the base branch
          git fetch origin "$BASE_REF"

          # Validate all commits from the base
          uvx --from commitizen cz check --rev-range "origin/$BASE_REF..HEAD"
