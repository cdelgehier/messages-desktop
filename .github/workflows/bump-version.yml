---
name: Bump Version

on:
  push:
    branches:
      - main

jobs:
  bump-version:
    name: Bump version and update changelog
    runs-on: ubuntu-latest

    # Avoid infinite loops: do not bump if the commit starts with "bump"
    if: "!startsWith(github.event.head_commit.message, 'bump')"

    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          fetch-depth: 0
          # Use PAT to trigger the create-release workflow when pushing tags
          token: ${{ secrets.PERSONAL_ACCESS_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: '3.x'

      - name: Install uv
        uses: astral-sh/setup-uv@38f3f104447c67c051c4a08e39b64a148898af3a # v4.2.0
        with:
          enable-cache: false

      - name: Install Commitizen
        run: uv tool install commitizen

      - name: Configure Git
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

      - name: Extract changelog for annotation
        id: changelog
        run: |
          CHANGELOG=$(uvx --from commitizen cz changelog --dry-run --incremental 2>/dev/null || echo "No changelog available")
          echo "changelog<<EOF" >> $GITHUB_OUTPUT
          echo "$CHANGELOG" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Bump version
        id: bump
        run: |
          # Perform the bump with annotated tag
          BUMP_OUTPUT=$(uvx --from commitizen cz -nr 21 bump --yes --annotated-tag --changelog 2>&1 || true)
          echo "$BUMP_OUTPUT"

          # Check if there is nothing to bump
          if echo "$BUMP_OUTPUT" | grep -q "\[NO_COMMITS_TO_BUMP\]"; then
            echo "skip=true" >> $GITHUB_OUTPUT
            echo "No version bump needed"
          else
            echo "skip=false" >> $GITHUB_OUTPUT
            NEW_VERSION=$(uvx --from commitizen cz version --project)
            echo "version=$NEW_VERSION" >> $GITHUB_OUTPUT
            echo "Version bumped to $NEW_VERSION"
          fi

      - name: Update annotated tag with changelog
        if: steps.bump.outputs.skip == 'false'
        env:
          CHANGELOG: ${{ steps.changelog.outputs.changelog }}
        run: |
          # Get the latest tag
          LATEST_TAG=$(git describe --tags --abbrev=0)

          # Delete and recreate the tag with the changelog as message
          git tag -d "$LATEST_TAG"
          git tag -a "$LATEST_TAG" -m "$CHANGELOG"

      - name: Push changes and tags
        if: steps.bump.outputs.skip == 'false'
        run: |
          git push origin main
          git push origin --tags --force

      - name: Summary
        env:
          SKIP: ${{ steps.bump.outputs.skip }}
          VERSION: ${{ steps.bump.outputs.version }}
        run: |
          if [ "$SKIP" == "true" ]; then
            echo "✅ No version bump needed" >> $GITHUB_STEP_SUMMARY
          else
            echo "✅ Version bumped to $VERSION" >> $GITHUB_STEP_SUMMARY
            echo "📝 Changelog updated" >> $GITHUB_STEP_SUMMARY
            echo "🏷️ Tag created: v$VERSION" >> $GITHUB_STEP_SUMMARY
          fi
